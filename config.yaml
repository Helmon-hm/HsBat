screen:
  game_region:
    x: 0
    y: 0
    width: 0
    height: 0
  scale: 1.0
templates:
  directory: templates
  match_threshold: 0.75
  end_turn_button: end_turn.png
ocr:
  tesseract_path: C:\Program Files\Tesseract-OCR\tesseract.exe
  lang: eng+chi_sim
  card_cost_offset:
    dx: 0
    dy: -30
    width: 40
    height: 30
llm:
  enabled: true
  provider: openai_compatible
  api_key: ''
  api_base: https://api.openai.com/v1
  model: gpt-4o
  timeout: 15
  max_retries: 2
  temperature: 0.3
  system_prompt: "你是炉石传说资深玩家。根据当前的游戏状态（手牌、法力水晶、场上随从、双方血量等），做出最优决策。\n请严格按照以下JSON格式输出你的决策：\n\
    {\n  \"action\": \"play_card\" | \"attack\" | \"use_hero_power\" | \"end_turn\"\
    \ | \"wait\",\n  \"card_index\": <int or null>,\n  \"target_index\": <int or null>,\n\
    \  \"target_type\": \"enemy_hero\" | \"enemy_minion\" | \"friendly_minion\" |\
    \ null,\n  \"reason\": \"<简短中文原因>\"\n}\n说明：\n- card_index: 0-based, 手牌索引（从左到右），不出牌时为null\n\
    - target_index: 攻击或法术目标索引，0-based\n- play_card: 出牌，需要指定card_index和可能的target_index\n\
    - attack: 用随从攻击，由主控制器决定攻击者，此动作表示攻击指令\n- use_hero_power: 使用英雄技能\n- 如果法力值不足或无法做任何事，输出\
    \ end_turn\n"
action:
  mouse_move_delay:
    min: 0.1
    max: 0.25
  click_delay:
    min: 0.15
    max: 0.4
  drag_duration:
    min: 0.25
    max: 0.5
  rest_delay:
    min: 0.1
    max: 0.3
  bezier_control_offset:
    min: 30
    max: 120
  bezier_points: 20
game:
  # --- 区域识别（相对百分比 0.0~1.0，适配任意分辨率）---
  # 法力水晶位于画面右下角，英雄头像旁边
  mana_region: [0.81, 0.84, 0.08, 0.03]
  health_region: [0.453, 0.894, 0.094, 0.037]
  enemy_health_region: [0.453, 0.069, 0.094, 0.037]
  hand_card_region: [0.083, 0.852, 0.833, 0.148]
  turn_indicator_region: [0.417, 0.444, 0.167, 0.111]
  # --- 颜色阈值 (不受分辨率影响) ---
  mana_color_lower: [200, 180, 50]
  mana_color_upper: [255, 230, 130]
  attackable_green_lower: [40, 80, 80]
  attackable_green_upper: [90, 255, 255]
  # --- 像素阈值 (以实际图片尺寸为基准自适应) ---
  attackable_green_border_width: 8
  attackable_green_min_ratio: 0.08
  minion_min_size: [0.016, 0.037]
  minion_max_size: [0.104, 0.278]
  minion_ocr_size: [0.016, 0.019]
  # --- 对局结束/重排队 ---
  auto_requeue: true
  post_game_click_region: [0.21, 0.60]
  play_button_region: [0.36, 0.56, 0.27, 0.06]
rule_engine:
  play_card_strategy: low_cost_first
  attack_strategy: face_only
  defend_when_lethal: true
  lethal_margin: 2
  use_hero_power: true
debug:
  enabled: true
  save_screenshots: true
  screenshot_dir: screenshots
  log_level: DEBUG
  ui_update_interval: 0.5
