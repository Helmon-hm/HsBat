screen:
  game_region:
    x: 0
    y: 0
    width: 0
    height: 0
  scale: 1.0

templates:
  directory: templates
  match_threshold: 0.70
  end_turn_button: end_turn.png
  play_button: play_button.png

ocr:
  tesseract_path: C:\Program Files\Tesseract-OCR\tesseract.exe
  lang: eng+chi_sim
  upscale_factor: 5
  card_cost_offset:
    dx: 0
    dy: -30
    width: 40
    height: 30

recognition:
  frame_cache_size: 5
  min_consistent_frames: 3
  canny_lower: 30
  canny_upper: 100
  minion_canny_lower: 50
  minion_canny_upper: 150
  binary_threshold_bright: 200
  binary_threshold_mid: 160
  binary_threshold_dark: 128
  min_contour_area_ratio: 0.000014
  card_min_width_ratio: 0.026
  card_min_height_ratio: 0.093
  card_name_offset_x_ratio: 0.01
  card_name_width_ratio: 0.021
  card_name_height_ratio: 0.023
  card_arc_center_y_ratio: 0.42
  card_arc_radius_ratio: 0.45
  card_arc_tolerance: 0.03
  board_gap_merge_ratio: 0.01
  card_count_method: sobel
  sobel_sigma: 8
  sobel_top_ratio: 0.35
  sobel_prominence: 0.10
  template_rotate_angles: [-35, -30, -25, -20, -15, -10, -5, 0, 5, 10, 15, 20, 25, 30, 35]

llm:
  enabled: true
  provider: openai_compatible
  api_key: ''
  api_base: https://api.openai.com/v1
  model: gpt-4o
  timeout: 15
  max_retries: 2
  temperature: 0.3
  system_prompt: "你是炉石传说资深玩家。根据当前的游戏状态（手牌、法力水晶、场上随从、双方血量等），做出最优决策。\n请严格按照以下JSON格式输出你的决策：\n\
    {\n  \"action\": \"play_card\" | \"attack\" | \"use_hero_power\" | \"end_turn\"\
    \ | \"wait\",\n  \"card_index\": <int or null>,\n  \"target_index\": <int or null>,\n\
    \  \"target_type\": \"enemy_hero\" | \"enemy_minion\" | \"friendly_minion\" |\
    \ null,\n  \"reason\": \"<简短中文原因>\"\n}\n说明：\n- card_index: 0-based, 手牌索引（从左到右），不出牌时为null\n\
    - target_index: 攻击或法术目标索引，0-based\n- play_card: 出牌，需要指定card_index和可能的target_index\n\
    - attack: 用随从攻击，由主控制器决定攻击者，此动作表示攻击指令\n- use_hero_power: 使用英雄技能\n- 如果法力值不足或无法做任何事，输出\
    \ end_turn\n"

action:
  mouse_move_delay:
    min: 0.1
    max: 0.25
  click_delay:
    min: 0.15
    max: 0.4
  drag_duration:
    min: 0.25
    max: 0.5
  rest_delay:
    min: 0.1
    max: 0.3
  bezier_control_offset:
    min: 30
    max: 120
  bezier_points: 20

game:
  # --- 区域识别（相对百分比 0.0~1.0，适配任意分辨率）---
  mana_region: [0.636, 0.9, 0.40, 0.05]
  mana_text_region: [0.636, 0.89, 0.05, 0.07]
  health_region: [0.524, 0.80, 0.027, 0.05]
